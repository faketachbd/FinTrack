name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build -- --base=./

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write Capacitor Config
        run: >
          echo '{"appId":"com.fintrack.app","appName":"FinTrack","webDir":"dist","server":{"androidScheme":"https","hostname":"localhost","cleartext":true}}' > capacitor.config.json

      - name: Add Android Platform
        run: npx cap add android 2>/dev/null || echo "Already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin Version
        run: |
          printf '\nsubprojects {\n    configurations.all {\n        resolutionStrategy.eachDependency { DependencyResolveDetails details ->\n            if (details.requested.group == "org.jetbrains.kotlin") {\n                details.useVersion "1.9.0"\n            }\n        }\n    }\n}\n' >> android/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FinTrack-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
